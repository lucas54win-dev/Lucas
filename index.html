<title>1-2-1 China Side</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
  body { background: #f5f5f5; color: #111; }
  header { background: #111; color: #fff; padding: 24px; text-align: center; }
  header h1 { font-size: 28px; letter-spacing: 2px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 24px;
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-4px); }
  .card img { width: 100%; height: 250px; object-fit: contain; background: #fafafa; padding: 12px; }
  .card .info { padding: 16px; }
  .card h3 { font-size: 15px; margin-bottom: 8px; }
  .card .price { color: #555; font-weight: bold; }
</style>
</head>

  <header>
    <h1>1-2-1 CHINA SIDE</h1>

  <div class="grid">
